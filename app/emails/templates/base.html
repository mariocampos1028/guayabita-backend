<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Guayabita{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#050f05;font-family:Arial,Helvetica,sans-serif;color:#f8fafc;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#050f05;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:linear-gradient(160deg,#102210 0%,#0a160a 100%);border:1px solid rgba(251,191,36,0.3);border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:28px 32px 12px;text-align:center;border-bottom:1px solid rgba(251,191,36,0.15);">
              <p style="margin:0;font-size:28px;line-height:1;">🎲</p>
              <p style="margin:8px 0 0;font-size:22px;font-weight:800;color:#fbbf24;">Guayabita</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 24px;text-align:center;border-top:1px solid rgba(255,255,255,0.08);">
              <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5;">
                Este correo fue enviado por Guayabita.<br />
                Si no creaste esta cuenta, puedes ignorar este mensaje.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
