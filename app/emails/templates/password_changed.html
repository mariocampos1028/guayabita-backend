{% extends "base.html" %}

{% block title %}Contraseña actualizada{% endblock %}

{% block content %}
  <h1 style="margin:0 0 12px;font-size:22px;color:#fbbf24;">Contraseña actualizada</h1>
  <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:rgba(255,255,255,0.8);">
    Hola {{ username }}, tu contraseña de Guayabita fue cambiada correctamente.
    Si no realizaste este cambio, contacta al soporte de inmediato.
  </p>

  <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 auto;">
    <tr>
      <td align="center" style="border-radius:10px;background:linear-gradient(135deg,#4ade80,#16a34a);">
        <a href="{{ login_url }}" target="_blank" style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:700;color:#052e16;text-decoration:none;">
          Iniciar sesión
        </a>
      </td>
    </tr>
  </table>
{% endblock %}
